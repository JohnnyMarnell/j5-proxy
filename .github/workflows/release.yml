name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Full CI must pass before anything is released
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Build + publish + release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub releases and upload assets
      id-token: write   # OIDC token for npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # setup-node configures npm auth via NODE_AUTH_TOKEN and the .npmrc it writes
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --ignore-scripts

      # --- JS + type declarations for npm publish ---
      - name: Build JS + types
        run: bun run build:all

      # --- Standalone self-contained binaries (no Bun/Node required to run) ---
      # Bun cross-compiles from Linux to all targets.
      # Users still need to run `playwright install chromium` separately (or let
      # the binary auto-prompt them on first launch — see core.ts checkCookiePrereqs).
      - name: Build standalone binaries
        run: |
          mkdir -p dist/binaries
          bun build --compile --target=bun-darwin-arm64  --outfile dist/binaries/j5-proxy-mac-arm64   index.ts
          bun build --compile --target=bun-darwin-x64    --outfile dist/binaries/j5-proxy-mac-x64     index.ts
          bun build --compile --target=bun-linux-x64     --outfile dist/binaries/j5-proxy-linux-x64   index.ts
          bun build --compile --target=bun-linux-arm64   --outfile dist/binaries/j5-proxy-linux-arm64 index.ts

      # --- GitHub Release ---
      # Auto-generates release notes from commits since the last tag.
      # Attaches the compiled binaries as downloadable assets.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/binaries/*

      # --- npm publish with provenance ---
      # --provenance uses the id-token: write OIDC permission above to cryptographically
      # sign the package and prove it was built from this exact commit + workflow.
      # This shows a "provenance" badge on the npm package page.
      #
      # Requires an NPM_TOKEN secret: npmjs.com → Access Tokens → Granular Access Token
      # (read+write on packages, scoped to j5-proxy, with expiry).
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
